services:
  backend:
    build: ./proyecto_aula-master
    container_name: pqrs-backend
    ports:
      - "8080:8080"
    networks:
      - pqrs-network
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: pqrs-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pqrs-network
    restart: unless-stopped

networks:
  pqrs-network:
    driver: bridge
