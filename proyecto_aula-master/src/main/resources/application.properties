spring.application.name=system-pqrs

# MongoDB Atlas
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.database=JACDB

# Server
server.port=8080

# JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Multipart — subida de evidencias
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS (separar con coma si hay múltiples orígenes)
app.cors.origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://localhost:8000}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dpygaslg8}
cloudinary.api-key=${CLOUDINARY_API_KEY:485457593249269}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:U0R0v4JO1PZjQ8TSJbNTQ7bWvL4}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
